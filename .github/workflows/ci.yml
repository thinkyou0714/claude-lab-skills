name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: validate / lint / test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev tools
        run: python -m pip install --upgrade pip pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Validate plugins (strict + internal link check)
        run: python validate_plugins.py --strict

      - name: Tests (pytest)
        run: pytest

  docs:
    name: docs lint (markdownlint + codespell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: codespell
        run: |
          python -m pip install --upgrade pip codespell
          codespell
